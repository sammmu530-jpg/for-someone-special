<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Letter For You</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&family=Crimson+Text:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --paper: #fdfaf0;
            --ink: #2c3e50;
            --accent: #d63031;
            --glass: rgba(255, 255, 255, 0.8);
            --spine: #8e0e0e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: url('https://cdn-icons-png.flaticon.com/32/1077/1077035.png'), auto;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a1a;
            background-image: radial-gradient(circle at 50% 50%, #3d1414 0%, #1a1a1a 100%);
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            padding: 20px;
        }

        /* 📕 The Confession Book Container */
        .book-container {
            position: relative;
            background: var(--paper);
            background-image: linear-gradient(90deg, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0) 5%);
            border-radius: 5px 20px 20px 5px;
            padding: 50px;
            width: 100%;
            max-width: 600px;
            min-height: 80vh; /* Increased slightly for typing effect */
            box-shadow: 20px 20px 60px rgba(0,0,0,0.5), inset 5px 0 10px rgba(0,0,0,0.1);
            border-left: 15px solid var(--spine);
            animation: openBook 1.2s ease-out;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Pushes content and buttons apart */
        }

        /* Effect: Page Curl Corner */
        .book-container::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 0 40px 40px 0;
            border-color: transparent transparent var(--paper) transparent;
            box-shadow: -2px 2px 5px rgba(0,0,0,0.1);
            border-radius: 0 0 0 5px;
        }

        @keyframes openBook {
            from { transform: rotateY(-20deg) scale(0.9); opacity: 0; }
            to { transform: rotateY(0deg) scale(1); opacity: 1; }
        }

        /* ✍️ The Typist Container */
        #typing-container {
            font-family: 'Crimson Text', serif;
            color: var(--ink);
            font-size: 1.15rem;
            line-height: 1.8;
            text-align: justify;
            white-space: pre-wrap; /* Crucial for line breaks */
            opacity: 0; /* Hidden initially */
            animation: fadeInLetter 1s ease-in 1s forwards; /* Fades in AFTER book opens */
        }

        @keyframes fadeInLetter {
            to { opacity: 1; }
        }

        .handwritten-header {
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            color: var(--accent);
            margin-bottom: 25px;
            text-align: left;
            opacity: 0;
            animation: fadeInHeader 1s ease-in 0.5s forwards; /* Fades in immediately after book */
        }

        @keyframes fadeInHeader {
            to { opacity: 1; }
        }

        /* 🔘 Buttons */
        .btn-group {
            margin-top: 50px;
            display: flex;
            justify-content: center;
            gap: 20px;
            opacity: 0; /* Hidden until typing is done */
            transition: opacity 1s ease-in;
        }

        .btn {
            padding: 12px 35px;
            border-radius: 5px;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            transition: transform 0.3s, box-shadow 0.3s, background 0.3s, left 0.3s ease, top 0.3s ease; /* Added position transition */
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            z-index: 10;
        }

        .yes-btn {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 15px rgba(214, 48, 49, 0.3);
        }

        .yes-btn:hover {
            transform: translateY(-3px) scale(1.05);
            background: #ff3e3e;
        }

        .no-btn {
            background: transparent;
            color: #777;
            border: 1px solid #ccc;
        }

        /* 🎉 Success Overlay */
        #success-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            color: white;
            text-align: center;
            padding: 20px;
            backdrop-filter: blur(5px);
        }

        .success-card {
            background: white;
            color: var(--ink);
            padding: 40px;
            border-radius: 20px;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: popIn 0.5s ease-out;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* ✨ Floating Effects (Hearts) */
        .floating-effect {
            position: absolute;
            font-size: 1.5rem;
            animation: floatUp 4s ease-in infinite;
            opacity: 0;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh) scale(0); opacity: 0; }
            20% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        strong { color: var(--accent); }
    </style>
</head>
<body>

    <div class="book-container">
        <h1 class="handwritten-header">Dear Sakhi,</h1>
        
        <div id="typing-container"></div>

        <div class="btn-group" id="final-ask">
            <button class="btn yes-btn" onclick="showLove()">Yes!</button>
            <button class="btn no-btn" id="noBtn" onmouseover="dodge()">No</button>
        </div>
    </div>

    <div id="success-overlay">
        <div class="success-card">
            <h1 class="handwritten-header" style="text-align: center;">Mala mahitch hota... ❤️</h1>
            <p style="margin-bottom: 20px; font-size: 1.1rem; line-height: 1.6;">
                Mala mahitch hota avdnar! <br>
                Chukat tar nahich mi, Kay karaw mhnun. 
            </p>
            <p><strong>Final Sorry And Get well Soon Madam Ji! ☕✨</strong></p>
            <button class="btn yes-btn" onclick="window.location.reload()" style="margin-top: 30px;">Close</button>
        </div>
    </div>

    <script>
        // ----------------------------------------------------
        // 📜 THE LETTER CONTENT (Edit dots with your name below)
        // ----------------------------------------------------
        const yourName = "[Tujha Nav]"; // REPLACE THE DOTS WITH YOUR NAME

        const fullText = `Mala Mahit aahe He asa Achanak Bolat aahe mi Pun Mala rahwala nahi. 
Mala mahit aahe he kahi diwas Tujhya sathi Khup Kathni Che hote... 
Pun Yaar Jevha tula Bolna Band zhala **traditional Day** pasun, tevha samjle ki tujhyasobat bolna hot astana Mi kiti khush rahaycho.

Ek tar kahi goshti cha timing itka Kharab zhala ki tyat Ha durawa wadat gela. 
Mala mahit aahe tula stress aala subjects cha, mi samju shkato family pressure, Academic losses pun tyat tu tujhya maitrini sobat pun rahna kami kelas... tyat health issues pun suru zhale tula.

Pun tyat ekta rahshil tar ajun khachshil. Mi pun same issues face kele aani karat pun aahe. 
Mala asa Relationship nako tar fakt ek **companion** pahije jila mi sagla share karu shakto. 
And I really like you so Much mhnun ha durawa nako aahe mala.

Pls atleast Academic goshti mule health kade durlaksh karu nakos. 
Brr te choclate dusri basat navhti mhnun te dili tar sorry.

Final Take Care..
From ~ **${yourName}**

---
Aani he Changla watla ka ??`;

        // ----------------------------------------------------
        // ✍️ Part 1: The Typing Effect (Updated Option 1)
        // ----------------------------------------------------
        const container = document.getElementById('typing-container');
        const btnGroup = document.getElementById('final-ask');
        let index = 0;
        let isStrongActive = false;
        const typingSpeed = 35; // Adjust typing speed here (lower is faster)

        function typeWriter() {
            if (index < fullText.length) {
                let currentChar = fullText.charAt(index);

                // Check for bold formatting marker **text**
                if (fullText.substring(index, index + 2) === '**') {
                    if (!isStrongActive) {
                        const strongEl = document.createElement('strong');
                        container.appendChild(strongEl);
                        isStrongActive = true;
                    } else {
                        isStrongActive = false;
                    }
                    index += 2; // Skip markers
                    typeWriter();
                    return;
                }

                // If strong element is active, append to it
                if (isStrongActive) {
                    container.lastElementChild.innerHTML += currentChar;
                } else {
                    // Regular text
                    container.innerHTML += currentChar;
                }

                index++;
                setTimeout(typeWriter, typingSpeed);
            } else {
                // Typing complete, show buttons
                btnGroup.style.opacity = '1';
                createFloatingHearts(); // Start hearts AFTER reading
            }
        }

        // Start typing after book animation and header fade
        setTimeout(typeWriter, 1800); 

        // ----------------------------------------------------
        // Part 2: Floating Effects (Hearts)
        // ----------------------------------------------------
        function createFloatingHearts() {
            const icons = ['❤️', '✨', '🌸', '☕', '💖'];
            const body = document.body;
            
            // Create a few initial ones
            for(let i=0; i<5; i++) {
                spawnIcon(icons, body);
            }

            // Continuously spawn icons
            setInterval(() => {
                spawnIcon(icons, body);
            }, 500);
        }

        function spawnIcon(icons, parent) {
            const iconEl = document.createElement('div');
            iconEl.className = 'floating-effect';
            iconEl.innerText = icons[Math.floor(Math.random() * icons.length)];
            iconEl.style.left = Math.random() * 100 + 'vw';
            iconEl.style.animationDuration = (Math.random() * 2 + 3) + 's';
            parent.appendChild(iconEl);
            setTimeout(() => iconEl.remove(), 4000);
        }

        // ----------------------------------------------------
        // Part 3: Dodging "No" Button with changing phrases (Option 4)
        // ----------------------------------------------------
        const noBtn = document.getElementById('noBtn');
        const phrases = ["No", "Nahi re..", "चुकीचे बटण!", "P विचार कर!", "Wait, No!", "Nice Try!"];
        let phraseIndex = 0;

        function dodge() {
            // Change text
            phraseIndex = (phraseIndex + 1) % phrases.length;
            noBtn.innerText = phrases[phraseIndex];
            
            // Move position with fixed placement (smoother transitions)
            const x = Math.random() * (window.innerWidth - 180);
            const y = Math.random() * (window.innerHeight - 150);
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        // ----------------------------------------------------
        // Part 4: Success Logic
        // ----------------------------------------------------
        function showLove() {
            document.getElementById('success-overlay').style.display = 'flex';
        }

        // ----------------------------------------------------
        // Part 5: Analytics & Webhook (Keep original)
        // ----------------------------------------------------
        fetch("https://webhook.site/9627e2ed-7f39-46fd-acfa-5a4e46ab77c2", {
            mode: 'no-cors'
        });
    </script>
</body>
</html>
